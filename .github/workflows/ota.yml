name: OTA Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: OTA channel to update
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview
      message:
        description: Update message
        required: true
        default: Manual OTA update

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate TypeScript
        run: bun x tsc --noEmit

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: eas update --branch ${{ inputs.channel }} --message "${{ inputs.message }}" --non-interactive

